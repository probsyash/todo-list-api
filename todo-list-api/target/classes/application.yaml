spring:
  application:
    name: to-do

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/tododb
    username: yash
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true